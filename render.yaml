services:
  - type: web
    name: safecross-mobility
    runtime: node
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CLIENT_ORIGIN
        value: "*"
      - key: PUBLIC_DATA_MODE
        value: hybrid
      - key: VITE_ULSAN_SELECTION_POLICY
        value: preset
      - key: VITE_ULSAN_COVERAGE_SCORE
        value: "0"
      - key: PUBLIC_DATA_TIMEOUT_MS
        value: "15000"
      - key: SIGNAL_API_URL
        value: https://apis.data.go.kr/B551982/rti
      - key: BUS_API_URL
        value: https://apis.data.go.kr/B551982/rte
      - key: MOBILITY_API_URL
        value: https://apis.data.go.kr/B551982/tsdo_v2
      - key: SIGNAL_STDG_CD
        value: "3100000000"
      - key: BUS_STDG_CD
        value: "3100000000"
      - key: MOBILITY_STDG_CD
        value: "1100000000"
      - key: SIGNAL_CACHE_TTL_MS
        value: "15000"
      - key: BUS_CACHE_TTL_MS
        value: "15000"
      - key: MOBILITY_CACHE_TTL_MS
        value: "30000"
      - key: SIGNAL_PAGE_SIZE
        value: "200"
      - key: SIGNAL_MAX_PAGES
        value: "2"
      - key: BUS_ROUTE_PAGE_SIZE
        value: "200"
      - key: BUS_ROUTE_MAX_PAGES
        value: "1"
      - key: BUS_STOP_PAGE_SIZE
        value: "300"
      - key: BUS_STOP_MAX_PAGES
        value: "2"
      - key: BUS_LIVE_PAGE_SIZE
        value: "200"
      - key: BUS_LIVE_MAX_PAGES
        value: "2"
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
