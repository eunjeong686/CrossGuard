services:
  - type: web
    name: safecross-mobility
    runtime: node
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start:server
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CLIENT_ORIGIN
        value: "*"
      - key: PUBLIC_DATA_MODE
        value: hybrid
      - key: PUBLIC_DATA_TIMEOUT_MS
        value: "5000"
      - key: SIGNAL_API_URL
        value: https://apis.data.go.kr/B551982/rti
      - key: BUS_API_URL
        value: https://apis.data.go.kr/B551982/rte
      - key: MOBILITY_API_URL
        value: https://apis.data.go.kr/B551982/tsdo_v2
      - key: SIGNAL_STDG_CD
        value: "1100000000"
      - key: BUS_STDG_CD
        value: "1100000000"
      - key: MOBILITY_STDG_CD
        value: "1100000000"
      - key: SIGNAL_CACHE_TTL_MS
        value: "15000"
      - key: BUS_CACHE_TTL_MS
        value: "15000"
      - key: MOBILITY_CACHE_TTL_MS
        value: "30000"
      - key: PUBLIC_DATA_SERVICE_KEY
        sync: false
